name: Non-Regression Tests

# ──────────────────────────────────────────────────────────────────────────────
# Trigger: manual only (workflow_dispatch)
#
# Run this suite deliberately — before a release, after a model upgrade, or
# when investigating a suspected regression. It is intentionally excluded from
# push / pull_request triggers to avoid burning Gemini + Pinecone quota on
# every commit.
#
# How to trigger:
#   GitHub UI → Actions → "Non-Regression Tests" → Run workflow
#   gh workflow run non-regression.yml [--ref <branch>]
# ──────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

# Only one TNR run at a time.
# If a push lands while a run is in progress (e.g. two quick merges), cancel
# the older one so the latest code is always what gets validated.
concurrency:
  group: non-regression
  cancel-in-progress: true

jobs:

  # ── A. Build Docker image ───────────────────────────────────────────────────
  # Produces the same artefact the smoke-test job uses in ci.yml so layer
  # caching is shared across both workflows via the GHA cache backend.
  build:
    name: Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image (no push)
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: false
          # Export as a tarball so the next job can load it without a registry.
          outputs: type=docker,dest=/tmp/misra-c-agent.tar
          tags: misra-c-agent:${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ github.ref_name }}
          # Share layer cache with ci.yml docker-build job.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image tarball
        uses: actions/upload-artifact@v7.0.0
        with:
          name: misra-c-agent-tnr-image-${{ github.sha }}
          path: /tmp/misra-c-agent.tar
          # Short retention — only needed for the duration of this workflow run.
          retention-days: 1

  # ── B. Non-Regression Suite ─────────────────────────────────────────────────
  non-regression:
    name: Non-Regression (golden dataset, -n 5)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    # All secrets injected here; no secret ever touches disk or test code.
    env:
      # Real external services — same Atlas + Pinecone used by integration tests.
      # The TNR user (TEST_EMAIL / TEST_PASSWORD) is permanently registered in
      # this Atlas instance; no user-creation step is needed.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      # TNR-specific credentials — pre-provisioned user in the Atlas DB.
      TEST_EMAIL: ${{ secrets.TNR_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TNR_TEST_PASSWORD }}
      # The api container is always reachable at localhost:8000 on the runner.
      TNR_BASE_URL: http://localhost:8000

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # ── 2. Load image ────────────────────────────────────────────────────────
      - name: Download image tarball
        uses: actions/download-artifact@v8.0.0
        with:
          name: misra-c-agent-tnr-image-${{ github.sha }}
          path: /tmp

      - name: Load image into Docker daemon
        run: docker load --input /tmp/misra-c-agent.tar

      # ── 3. Write .env for docker compose env_file ────────────────────────────
      # docker-compose.yml reads env_file: .env (required: false).
      # We write the real secrets here so the container picks them up without
      # needing to pass every var through `environment:` overrides.
      - name: Write .env file
        run: |
          cat > .env <<EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          EOF

      # ── 4. MongoDB Atlas — whitelist runner IP ───────────────────────────────
      # Same pattern as the integration job in ci.yml.
      # The TNR suite uses the same persistent Atlas cluster, so the runner's
      # ephemeral IP must be whitelisted before any connection is attempted.
      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -sf https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Whitelist runner IP on MongoDB Atlas
        run: |
          curl -sf \
            --user "${{ secrets.MDB_PUBLIC_API_KEY }}:${{ secrets.MDB_PRIVATE_API_KEY }}" \
            --digest \
            --header "Content-Type: application/json" \
            --request POST \
            "https://cloud.mongodb.com/api/atlas/v1.0/groups/${{ secrets.MDB_ATLAS_PROJECT_ID }}/accessList" \
            --data "[{\"ipAddress\": \"${{ steps.runner_ip.outputs.ip }}\", \"comment\": \"tnr-runner (auto-removed)\"}]"

      # ── 5. Boot the stack ────────────────────────────────────────────────────
      # The TNR override removes the local mongodb dependency from `api`
      # (MONGODB_URI points to Atlas) and strips the hot-reload volume mount.
      # Only api + redis are started; the mongodb service is not requested.
      - name: Start api + redis
        env:
          APP_IMAGE: misra-c-agent:${{ github.sha }}
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.tnr.yml \
            up -d api redis

      # ── 6. Wait for container HEALTHCHECK ────────────────────────────────────
      # The Dockerfile HEALTHCHECK polls GET /api/v1/health every 5 s.
      # We wait up to 120 s for it to reach "healthy" before running any test.
      - name: Wait for HEALTHCHECK to pass
        run: |
          echo "Waiting for container healthcheck..."
          timeout 120s bash -c \
            'until [ "$(docker inspect -f {{.State.Health.Status}} misra-c-agent-api)" == "healthy" ]; \
             do sleep 3; done'
          echo "Container is healthy."

      # ── 7. Python + test dependencies ───────────────────────────────────────
      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 8. Run non-regression suite ─────────────────────────────────────────
      # -n 10         : 10 xdist worker processes — runs all 10 test cases
      #                 concurrently for maximum speed (~40s total runtime).
      #                 Each worker authenticates once (session-scoped
      #                 tnr_auth_token fixture) and reuses its token.
      # --timeout=120 : per-test hard cap via pytest-timeout (LangGraph pipeline
      #                 is normally 20-40 s; 120 s catches hung requests cleanly)
      # --junitxml    : machine-readable results for the test-reporter step below
      - name: Run non-regression tests
        run: |
          pytest tests/non_regression/ \
            -v \
            -m non_regression \
            -n 10 \
            --timeout=120 \
            --junitxml=reports/tnr-results.xml

      # ── 9. Publish test results to GitHub summary ────────────────────────────
      # Renders a per-case pass/fail table directly in the PR / commit view.
      # Runs even if the test step failed so failures are always visible.
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Non-Regression Results
          path: reports/tnr-results.xml
          reporter: java-junit
          fail-on-error: false

      # ── 10. Upload JUnit XML artifact ────────────────────────────────────────
      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: tnr-results-${{ github.sha }}
          path: reports/tnr-results.xml
          retention-days: 14

      # ── 11. Teardown (always) ────────────────────────────────────────────────
      - name: Remove runner IP from MongoDB Atlas whitelist
        if: always()
        run: |
          curl -sf \
            --user "${{ secrets.MDB_PUBLIC_API_KEY }}:${{ secrets.MDB_PRIVATE_API_KEY }}" \
            --digest \
            --request DELETE \
            "https://cloud.mongodb.com/api/atlas/v1.0/groups/${{ secrets.MDB_ATLAS_PROJECT_ID }}/accessList/${{ steps.runner_ip.outputs.ip }}"

      - name: Tear down Docker stack
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.tnr.yml \

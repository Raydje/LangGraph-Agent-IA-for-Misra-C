name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against the Python versions you want to support
        python-version: ["3.12.3"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # This caches dependencies and speeds up your pipeline

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install project dependencies
        pip install -r requirements.txt
        # ruff is the only tool absent from requirements.txt
        pip install ruff

    - name: Lint with Ruff (Optional but highly recommended for CVs)
      run: |
        # Stops the build if there are syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --output-format=github
        
    - name: Run Unit Tests with Pytest
      env:
        # If your unit tests require environment variables to instantiate classes
        # even when mocked, provide dummy values here. 
        # For actual live tests, use GitHub Secrets (explained below).
        PINECONE_API_KEY: "dummy_key"
        GEMINI_API_KEY: "dummy_key"
        MONGODB_URI: "mongodb://localhost:27017"
        JWT_SECRET_KEY: "test-only-insecure-jwt-secret-do-not-use-in-prod"
      run: |
        # We target tests/unit to avoid running live non-regression tests that cost money
        pytest tests/unit/ --cov=app --cov-report=term-missing
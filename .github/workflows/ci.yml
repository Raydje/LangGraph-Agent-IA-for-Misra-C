name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── 0. Kubernetes Manifest Linting (kube-linter) ─────────────────────────────
  # Runs in parallel with all other jobs — no needs.
  # Validates deploy/k8s/ manifests against production best-practice checks:
  # non-root users, resource limits, liveness/readiness probes, etc.
  # Treats the IaC in deploy/ as first-class code with its own quality gate.
  kube-lint:
    name: Lint K8s Manifests (kube-linter)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Run kube-linter
        uses: stackrox/kube-linter-action@v1.0.5
        with:
          directory: deploy/k8s
          # config: deploy/k8s/.kube-linter.yaml  # uncomment to add custom checks

  # ── 1. Lint (Ruff) ────────────────────────────────────────────────────────────
  ruff:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Check formatting with Ruff
        run: ruff format --check .

  # ── 2. CodeQL Security Analysis ──────────────────────────────────────────────
  codeql:
    name: CodeQL Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo 'If you are using a "manual" build mode for one or more of the languages you are analyzing, replace this with the commands to build your code, for example:'
          echo '  make bootstrap'
          echo '  make release'
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ── 3. Static Type Checking (Mypy) ───────────────────────────────────────────
  mypy:
    name: Static Type Checking (Mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: Run Mypy
        env:
          PINECONE_API_KEY: "dummy_key"
          GEMINI_API_KEY: "dummy_key"
          MONGODB_URI: "mongodb://localhost:27017"
          JWT_SECRET_KEY: "test-only-insecure-jwt-secret-do-not-use-in-prod"
        run: mypy app/

  # ── 4. Security Scanning (Bandit & pip-audit) ─────────────────────────────────
  security:
    name: Security Scanning (Bandit & pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Run Bandit
        run: bandit -r app/ -ll

      - name: Run pip-audit
        run: pip-audit

  # ── 5. Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [kube-lint, ruff, codeql, mypy, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with Pytest
        env:
          PINECONE_API_KEY: "dummy_key"
          GEMINI_API_KEY: "dummy_key"
          MONGODB_URI: "mongodb://localhost:27017"
          JWT_SECRET_KEY: "test-only-insecure-jwt-secret-do-not-use-in-prod"
        run: |
          pytest tests/unit/ --cov=app --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7.0.0
        with:
          name: unit-test-coverage-report
          path: htmlcov/

  # ── 6. Integration Tests ──────────────────────────────────────────────────────
  integration:
    name: Integration Tests (live APIs)
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -sf https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Whitelist runner IP on MongoDB Atlas
        run: |
          curl -sf --user "${{ secrets.MDB_PUBLIC_API_KEY }}:${{ secrets.MDB_PRIVATE_API_KEY }}" \
               --digest \
               --header "Content-Type: application/json" \
               --request POST \
               "https://cloud.mongodb.com/api/atlas/v1.0/groups/${{ secrets.MDB_ATLAS_PROJECT_ID }}/accessList" \
               --data "[{\"ipAddress\": \"${{ steps.runner_ip.outputs.ip }}\", \"comment\": \"github-actions-runner (auto-removed)\"}]"

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short -p no:timeout

      - name: Remove runner IP from MongoDB Atlas whitelist
        if: always()
        run: |
          curl -sf --user "${{ secrets.MDB_PUBLIC_API_KEY }}:${{ secrets.MDB_PRIVATE_API_KEY }}" \
               --digest \
               --request DELETE \
               "https://cloud.mongodb.com/api/atlas/v1.0/groups/${{ secrets.MDB_ATLAS_PROJECT_ID }}/accessList/${{ steps.runner_ip.outputs.ip }}"

  # ── 7. Docker Build ───────────────────────────────────────────────────────────
  # Runs in parallel with ALL other jobs — no needs.
  # Purpose: prove the Dockerfile builds successfully on every push and PR,
  # as early as possible, independent of test results.
  #
  # Does NOT push to any registry. Instead, exports a tarball artifact that
  # docker-push (job 8) will load and publish after all quality gates pass.
  # This guarantees the exact same binary is published — no second build, no drift.
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [kube-lint]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image (no push)
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: false
          # Export as a tarball — docker-push loads this exact image, no rebuild
          outputs: type=docker,dest=/tmp/misra-c-agent.tar
          tags: misra-c-agent:${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ github.ref_name }}
          # GHA layer cache: reuses unchanged layers across runs to cut build time
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image tarball
        uses: actions/upload-artifact@v7.0.0
        with:
          name: misra-c-agent-image-${{ github.sha }}
          path: /tmp/misra-c-agent.tar
          # Short retention: only needs to live long enough for docker-push to consume.
          # Avoids unnecessary storage costs on PRs that never merge.
          retention-days: 1

  # ── 8. Container Smoke Test ──────────────────────────────────────────────────
  # Gated on docker-build.
  # Verifies that the artifact produced by the build stage actually runs,
  # respects the non-root user, and passes its own internal HEALTHCHECK.
  container-smoke-test:
    name: Container Smoke Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download image tarball
        uses: actions/download-artifact@v8.0.0
        with:
          name: misra-c-agent-image-${{ github.sha }}
          path: /tmp

      - name: Load image from tarball
        run: docker load --input /tmp/misra-c-agent.tar

      - name: Create .env file
        # Satisfies older Docker Compose versions that do not support required: false.
        # No secrets needed — env vars are injected via the env: block below.
        run: touch .env

      - name: Start stack
        env:
          APP_IMAGE: misra-c-agent:${{ github.sha }}
          # Local containerised MongoDB — no Atlas connection needed for a smoke test.
          MONGODB_URI: "mongodb://mongodb:27017/test"
          # Pinecone is intentionally disconnected; app starts in degraded mode.
          PINECONE_API_KEY: "dummy"
          GEMINI_API_KEY: "dummy"
          JWT_SECRET_KEY: "dummy-smoke-test-jwt-secret"
        run: |
          docker compose up -d api

      - name: Wait for HEALTHCHECK
        run: |
          echo "Waiting for container healthcheck to pass..."
          timeout 120s bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} misra-c-agent-api)" == "healthy" ]; do sleep 2; done'

      - name: Verify API Health Endpoint
        # Pinecone is intentionally a dummy key in the smoke test, so the response
        # will be "degraded". We assert the server is up and MongoDB (local container)
        # is reachable — full connectivity is validated in the integration tests job.
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/api/v1/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -E '"status":"(healthy|degraded)"'
          echo "$RESPONSE" | grep '"mongodb_connected":true'

      - name: Cleanup
        if: always()
        run: docker compose down

  # ── 9. Docker Push ────────────────────────────────────────────────────────────
  # Gated on ALL quality gates (unit-tests → integration) AND container-smoke-test.
  # Only runs on merges to main — never on PRs.
  #
  # Downloads the tarball produced by docker-build and pushes it to GHCR.
  # The published image is tagged with the commit SHA for full traceability.
  docker-push:
    name: Docker Push (GHCR)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration, container-smoke-test]
    # Guard: only publish on merges to main, never on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write  # required to push to GHCR

    steps:
      - name: Download image tarball
        uses: actions/download-artifact@v8.0.0
        with:
          name: misra-c-agent-image-${{ github.sha }}
          path: /tmp

      - name: Load image from tarball
        run: docker load --input /tmp/misra-c-agent.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is built-in — no manual secret required for GHCR
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Tag and push to GHCR
        run: |
          # SHA tag: immutable reference for deployments and E2E tests
          docker tag misra-c-agent:${{ github.sha }} ${IMAGE}:${{ github.sha }}
          # latest tag: convenience pointer, always reflects the last validated main build
          docker tag misra-c-agent:${{ github.sha }} ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

      - name: Output published image
        run: |
          echo "Published: ${IMAGE}:${{ github.sha }}"
          echo ""
          echo "To deploy to a Kubernetes cluster:"
          echo "  kubectl apply -f deploy/k8s/namespace.yaml"
          echo "  kubectl apply -f deploy/k8s/configmap.yaml"
          echo "  kubectl apply -f deploy/k8s/secret.yaml    # populate values first"
          echo "  kubectl apply -f deploy/k8s/deployment.yaml"
          echo "  kubectl apply -f deploy/k8s/service.yaml"
          echo "  kubectl apply -f deploy/k8s/ingress.yaml"
          echo "  kubectl set image deployment/misra-c-agent-api \\"
          echo "    api=${IMAGE}:${{ github.sha }} -n misra-c-agent"
          echo ""
          echo "To run the full stack locally against this exact image:"
          echo "  APP_IMAGE=${IMAGE}:${{ github.sha }} docker compose up -d"

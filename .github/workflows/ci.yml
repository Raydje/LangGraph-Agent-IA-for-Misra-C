name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── 1. Lint (Ruff) ────────────────────────────────────────────────────────────
  ruff:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check . --select=E9,F63,F7,F82 --output-format=github

  # ── 2. CodeQL Security Analysis ──────────────────────────────────────────────
  codeql:
    name: CodeQL Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo 'If you are using a "manual" build mode for one or more of the languages you are analyzing, replace this with the commands to build your code, for example:'
          echo '  make bootstrap'
          echo '  make release'
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ── 3. Static Type Checking (Mypy) ───────────────────────────────────────────
  mypy:
    name: Static Type Checking (Mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: Run Mypy
        env:
          PINECONE_API_KEY: "dummy_key"
          GEMINI_API_KEY: "dummy_key"
          MONGODB_URI: "mongodb://localhost:27017"
          JWT_SECRET_KEY: "test-only-insecure-jwt-secret-do-not-use-in-prod"
        run: mypy app/

  # ── 4. Security Scanning (Bandit & pip-audit) ─────────────────────────────────
  security:
    name: Security Scanning (Bandit & pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Run Bandit
        run: bandit -r app/ -ll

      - name: Run pip-audit
        run: pip-audit

  # ── 5. Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [ruff, codeql, mypy, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: |
          ruff check . --select=E9,F63,F7,F82 --output-format=github

      - name: Run unit tests with Pytest
        env:
          PINECONE_API_KEY: "dummy_key"
          GEMINI_API_KEY: "dummy_key"
          MONGODB_URI: "mongodb://localhost:27017"
          JWT_SECRET_KEY: "test-only-insecure-jwt-secret-do-not-use-in-prod"
        run: |
          pytest tests/unit/ --cov=app --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-report
          path: htmlcov/

  # ── 6. Integration Tests ──────────────────────────────────────────────────────
  integration:
    name: Integration Tests (live APIs)
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff (integration test files)
        run: |
          pip install ruff
          ruff check tests/integration/ --select=E9,F63,F7,F82 --output-format=github

      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -sf https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Whitelist runner IP on MongoDB Atlas
        run: |
          curl -sf --user "${{ secrets.MDB_PUBLIC_API_KEY }}:${{ secrets.MDB_PRIVATE_API_KEY }}" \
               --digest \
               --header "Content-Type: application/json" \
               --request POST \
               "https://cloud.mongodb.com/api/atlas/v1.0/groups/${{ secrets.MDB_ATLAS_PROJECT_ID }}/accessList" \
               --data "[{\"ipAddress\": \"${{ steps.runner_ip.outputs.ip }}\", \"comment\": \"github-actions-runner (auto-removed)\"}]"

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short -p no:timeout

      - name: Remove runner IP from MongoDB Atlas whitelist
        if: always()
        run: |
          curl -sf --user "${{ secrets.MDB_PUBLIC_API_KEY }}:${{ secrets.MDB_PRIVATE_API_KEY }}" \
               --digest \
               --request DELETE \
               "https://cloud.mongodb.com/api/atlas/v1.0/groups/${{ secrets.MDB_ATLAS_PROJECT_ID }}/accessList/${{ steps.runner_ip.outputs.ip }}"

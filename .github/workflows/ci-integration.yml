name: Integration Tests

# Runs on every push/PR to main/master using real API credentials injected
# from GitHub Secrets.  If secrets are not configured (e.g. a fork PR) the
# conftest.py guard fires and the job reports skipped tests rather than
# failing with connection errors.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  integration:
    name: Node Integration Tests (live APIs)
    runs-on: ubuntu-latest

    env:
      # Real credentials — must be configured as encrypted GitHub Secrets.
      # If a secret is absent the value evaluates to an empty string and the
      # conftest.py secrets guard will skip all integration tests gracefully.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff (integration test files)
        run: |
          pip install ruff
          ruff check tests/integration/ --select=E9,F63,F7,F82 --output-format=github

      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -sf https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Whitelist runner IP on MongoDB Atlas
        run: |
          curl -sf --user "${{ secrets.MDB_PUBLIC_API_KEY }}:${{ secrets.MDB_PRIVATE_API_KEY }}" \
               --digest \
               --header "Content-Type: application/json" \
               --request POST \
               "https://cloud.mongodb.com/api/atlas/v1.0/groups/${{ secrets.MDB_ATLAS_PROJECT_ID }}/accessList" \
               --data "[{\"ipAddress\": \"${{ steps.runner_ip.outputs.ip }}\", \"comment\": \"github-actions-runner (auto-removed)\"}]"

      - name: Run integration tests
        # -v           : verbose output — shows each test name + pass/skip/fail
        # --tb=short   : concise traceback on failures (keeps logs readable)
        # -p no:timeout: disable any pytest-timeout plugin interference with
        #                long LLM calls (the nodes have their own asyncio timeouts)
        run: |
          pytest tests/integration/ -v --tb=short -p no:timeout

      - name: Remove runner IP from MongoDB Atlas whitelist
        # always() ensures cleanup runs even when the test step fails, so the
        # ephemeral CI IP is never left permanently open in the Atlas access list.
        if: always()
        run: |
          curl -sf --user "${{ secrets.MDB_PUBLIC_API_KEY }}:${{ secrets.MDB_PRIVATE_API_KEY }}" \
               --digest \
               --request DELETE \
               "https://cloud.mongodb.com/api/atlas/v1.0/groups/${{ secrets.MDB_ATLAS_PROJECT_ID }}/accessList/${{ steps.runner_ip.outputs.ip }}"

name: Integration Tests

# Runs on every push/PR to main/master using real API credentials injected
# from GitHub Secrets.  If secrets are not configured (e.g. a fork PR) the
# conftest.py guard fires and the job reports skipped tests rather than
# failing with connection errors.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  integration:
    name: Node Integration Tests (live APIs)
    runs-on: ubuntu-latest

    env:
      # Real credentials — must be configured as encrypted GitHub Secrets.
      # If a secret is absent the value evaluates to an empty string and the
      # conftest.py secrets guard will skip all integration tests gracefully.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff (integration test files)
        run: |
          pip install ruff
          ruff check tests/integration/ --select=E9,F63,F7,F82 --output-format=github

      - name: Run integration tests
        # -v           : verbose output — shows each test name + pass/skip/fail
        # --tb=short   : concise traceback on failures (keeps logs readable)
        # -p no:timeout: disable any pytest-timeout plugin interference with
        #                long LLM calls (the nodes have their own asyncio timeouts)
        run: |
          pytest tests/integration/ -v --tb=short -p no:timeout

[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests/unit
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
filterwarnings =
    ignore:coroutine 'patch_to_thread.*' was never awaited:RuntimeWarning
    ignore:coroutine 'AsyncMockMixin.*' was never awaited:RuntimeWarning

[coverage:run]
source = app
omit =
    app/data/seed_rules.py
    app/models_pricing.py
    app/__init__.py
    app/*/__init__.py
    app/*/*/__init__.py

[coverage:report]
show_missing = True

# ──────────────────────────────────────────────────────────────────────────────
# secret.yaml — TEMPLATE ONLY. DO NOT COMMIT REAL VALUES.
#
# All values below are base64-encoded placeholders.
# Before deploying, replace each <base64-encoded-value> with the real secret:
#
#   echo -n "your-actual-value" | base64
#
# Then apply with:
#   kubectl apply -f deploy/k8s/secret.yaml
#
# In production, prefer a secrets manager (Vault, AWS Secrets Manager,
# GCP Secret Manager) with External Secrets Operator rather than
# committing this file — even with placeholder values.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: misra-c-agent-secrets
  namespace: misra-c-agent
  labels:
    app.kubernetes.io/name: misra-c-agent
    app.kubernetes.io/component: api
# type Opaque is the default for arbitrary key/value secrets
type: Opaque
data:
  # External LLM provider key — https://aistudio.google.com/apikey
  # echo -n "AIza..." | base64
  GEMINI_API_KEY: <base64-encoded-value>

  # Vector database key — https://app.pinecone.io
  # echo -n "pcsk_..." | base64
  PINECONE_API_KEY: <base64-encoded-value>

  # MongoDB Atlas connection string — includes username, password, and cluster hostname.
  # Use a dedicated DB user with least-privilege (readWrite on one database only).
  # echo -n "mongodb+srv://user:pass@cluster.mongodb.net/misra" | base64
  MONGODB_URI: <base64-encoded-value>

  # JWT signing secret — minimum 32 random bytes.
  # Generate: python -c "import secrets; print(secrets.token_hex(32))" | base64
  JWT_SECRET_KEY: <base64-encoded-value>

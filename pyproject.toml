[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
# Enable standard rules
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "B008", # Do not perform function call `Depends` in argument defaults
    "E501", # Line too long (manually maintained)
    "E402", # Module level import not at top of file (intentional in scripts)
]

# Allow autofix for all enabled rules (when supported).
fixable = ["ALL"]
unfixable = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
